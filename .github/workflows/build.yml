# .github/workflows/build.yml
name: Build Unsigned IPA

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-14
    steps:
    - uses: actions/checkout@v4

    - name: Select Xcode
      run: sudo xcode-select -s /Applications/Xcode_15.4.app/Contents/Developer

    - name: Generate Project
      run: |
        chmod +x generate_project.sh
        bash generate_project.sh

    - name: Verify
      run: |
        test -f BDFlix.xcodeproj/project.pbxproj && echo "pbxproj OK" || exit 1
        find BDFlix -name "*.swift" | sort

    - name: Build
      run: |
        xcodebuild -project BDFlix.xcodeproj \
          -scheme BDFlix \
          -configuration Release \
          -sdk iphoneos \
          -destination 'generic/platform=iOS' \
          -archivePath build/BDFlix.xcarchive \
          CODE_SIGN_IDENTITY="" \
          CODE_SIGNING_REQUIRED=NO \
          CODE_SIGNING_ALLOWED=NO \
          DEVELOPMENT_TEAM="" \
          PROVISIONING_PROFILE="" \
          archive

    - name: Create IPA
      run: |
        mkdir -p build/Payload
        cp -r build/BDFlix.xcarchive/Products/Applications/BDFlix.app build/Payload/
        cd build && zip -r BDFlix.ipa Payload

    - name: Upload IPA
      uses: actions/upload-artifact@v4
      with:
        name: BDFlix-unsigned
        path: build/BDFlix.ipa

    - name: Release
      if: github.ref == 'refs/heads/main' && github.event_name == 'push'
      uses: softprops/action-gh-release@v1
      with:
        tag_name: v2.0.${{ github.run_number }}
        name: BDFlix v2.0.${{ github.run_number }}
        files: build/BDFlix.ipa
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
